front:
  text: 三篇同卷松七
  hash: sha256:1990d40e521628f0e6e5ae9708120f67272d5910f83af14e01631a77396031ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0343_HFL_000-001a, image: hfl/0599/0599-004.png}
body:
  text: 靈飛散傳信録厲門公妙解録玄霜掌上録雲飛散傳信録余與憲臺察史博陵晦叔有遺世保形超蹈山海之契嘗共語求學之士探擬賖謬耻營近實虛務遐闊未易凡鄙便冀飛升謂金丹坐延而仙籍立致夫處心不置於道鍊形未異於常齒髮不駐顔色隨謝是氣血內耗而容狀外變病疾未脫嗜欲交煎天生速死不及常理區區貪昏多此類也今所為異必求良方先驗容齒與俗流自別知常限不迫方可冀久親修仙材鍊神清虛求餌芝玉約索精要近拯形骸有新聞閲互相曉導晦叔異日謂余曰有客話裴都尉者鶴髮早垂重顔近復訪其所餌曰靈飛散之功共知此方在千金第二十八卷晦叔又曰聞勳曹員外即范陽君彛嘗與修氣道客吳含人丹講求此方丹曰千金近略多不真定此方本出太清仙經可求正文如法合餌君彛私志亦未卜所護時寓纍于故李中書泌之宅暇日偶入一小室有書籍盈几皆斷爛罕全雜委元次軸閲將卒忽遇一軸𥛦首完整丈墨甚華題曰大清真經發視乃靈飛散方卷君彛執讀欣契誠求驟告於丹乃焚香頂奉滌手持棒謂君彛曰此真官曲遺靈應特延紀於仙書足勸後學晦叔以余與君彞莫逆分至傳信可憑約就咨訪便求傳寫余驅乘詣門問與聞叶因得抄録與晦叔同之又方中分味以雲粉為主是嵗余授鐘陵奏辟而廬阜在封部之內爐峯跳波脉注溪壑居人方士皆引湍春雲水汰日曝流霜瑩雪丸珠旋螺宛若天造貨於村市資為衣食常肆所積日取無限此方難要唯兹一物有是行也實天借心謀亦將旁利同志不然何契㑹如此以先約話余私貯靈感不忘寢興行商洛數程息豹藏舍郵客有自內鄉來者曰有鄧掾融攝宰前邑年踰從心之五而婆鬢不老目瞳不昏理劇接賔與强仕等力問其所得曰嘗獲神方余至邑徵訪乃靈飛散所致考其傳授及藥力驗應云昔歲見唐主簿有道流口付說是靈仙上方欲𥨖功用可立變鬢髮融有親容顔鬢已衰將試靈驗因求合分服三十日融之親容顔髮頓易前狀融半劑之效亦保數十年不改恨其藥力未成便闕服餌又遠謫窮悴資貨多乖今比凡流猶有所異復說在長安日傳張裴二駙馬皆目變效重符前聞則此方神竒驗實相接眼覿口問積為明徵又孫處士道問上流精窮方要掇此編録固非偶然余與晦叔幸君彛之遇果求向之約誓心服食以邀效證他日之異續此編書元和七年四月五日髙陽齊推書心記實太清經云凡欲致萬神求升仙皆先潔齊清已香水灌頭沐浴五體益善百日之後乃可致神明欲求仙者當從此嶽西嶽中嶽真人求靈飛散得而服之必得神仙矣真人曰几欲求神仙不老長生久視白髮更黑齒落更生面目悅澤肌骨有光從表覩裹者當服靈飛散老君曰此方術之要神仙之道必化之本道士服之神仙不難術士服之遊於華山凡夫服之年去更還老翁服之反生童顔老君曰服此藥者可以不老十日服之三年不食服之三年可夀三千六百歲我非一人皆得真道保成神仙靈飛散方雲母一斤鍊成者茯苓半斤亦可一斤柏子仁七兩石鐘乳七兩菊花五兩亦可十五兩术四兩一本人參七兩乾地黃十二兩亦可十五兩桂心七兩續斷七兩凡九物治下篩訖以生天門冬十九斤搗麋絞取汁以丸此藥汁多可和之汁少者溲之著銅器中懸著甑下蒸黍一斛二斗熟出藥曝乾更治搗之令細篩服一方寸七日一服無毒可多服耳當食十日身輕二十日耳目聰明七十日髮白返黑髮盡落齒皆去者取藥二十七七以白蜜和之搗二百下止丸如梧桐子可得八十一九曝令燥訖視丸表裏相見如明月珠或似熒火精珠或赤或白此仙人隨身常所服藥也欲令髮齒時生日服此七丸日三服至髮生不白不落若入深山不食亦可作此丸日七丸不饑也若頭髮不落未白但可服散可夀五六百年不白耳白者如前法已白服藥可至七百年乃落求道服藥不頭白齒落者日兩服之得仙之要齒骨尸解道之下者凡作此靈飛散服之三日力倍五日血脉盛七日身輕十日面目悅澤智慮聰明十五日力作不知極徐行及馬二十日不復當三十五日夜視有光洽雲母法白鹽一斤和合雲母一斤并搗之右雲母搗糜勿篩內重布囊中挼挻之水汰鹽味盡內絹囊中懸令乾即成粉一法以鹽湯煮之盡解如泥狀挻之為粉又法雲母一斤大盬一斗漬之銅器中三四蒸之一日於臼中搗之為粉又法用朴硝水三斗煮治雲母一斤取成粉燥舒之向日光看無芒便好有芒勿服服之久後病殺人宜精治此本於盧司勳所得正經上傳寫記經中云搗雲母糜後入重布囊中挼挻之令須入皮囊中挼挻大抵不如取廬山水磑舂搗者最為輕細自造恐功不至忽有粗芒者損人愼之服藥後禁食鯉魚能斷一切魚為上恐刀砧相染所害不輕又禁食血是生肉生乾脯之類血羮是熟血𨚫非所忌禁生葱蒜生韭醶醋桃李木爪酸物等並不宜食又忌流水若江行及溪澗無井處但煎熟食之亦得大麥損雲母力亦宜愼之服此藥能斷薰血兼修靜心氣得效尤速不得面受故此批上孫處士進養生祕訣云臣遇此方已來將踰三紀頃者但美而悅之疑而未敢措手積年詢訪屢有好事人曽餌得力遂即服之一如方說但能業之不已功不徒棄也靈飛散傳信録
